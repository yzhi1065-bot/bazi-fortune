<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1816"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c49540"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <text x="256" y="200" text-anchor="middle" dominant-baseline="central"
    font-size="180" font-weight="bold" fill="url(#gold)" font-family="serif">八</text>
  <text x="256" y="360" text-anchor="middle" dominant-baseline="central"
    font-size="100" font-weight="bold" fill="url(#gold)" font-family="serif">字</text>
