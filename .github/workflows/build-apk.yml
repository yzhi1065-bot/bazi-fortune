name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @pwabuilder/bubblewrap

      - name: Create TWA Config
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.bazi.fortune",
            "host": "yzhi1065-bot.github.io",
            "name": "岐轩八字排盘",
            "shortName": "岐轩八字",
            "display": "standalone",
            "orientation": "portrait",
            "startUrl": "/bazi-fortune/",
            "themeColor": "#c4a265",
            "backgroundColor": "#0a0a14",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signing": {
              "keystore": "bazi.keystore",
              "keystorePassword": "bazi2026",
              "keyAlias": "bazi",
              "keyPassword": "bazi2026"
            },
            "icons": {
              "192": "icons/icon-192.svg",
              "512": "icons/icon-512.svg"
            }
          }
          EOF

      - name: Build APK with Bubblewrap
        run: npx @pwabuilder/bubblewrap build --config twa-manifest.json --directory app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazi-fortune-apk
          path: app/app-release-signed.apk
          if-no-files-found: error
