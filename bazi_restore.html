<script>
(function(){var s='',n=50;for(var i=0;i<n;i++)s+='<div class=star style=top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--s:'+(.8+Math.random()*2)+'px;--d:'+(2+Math.random()*4)+'s></div>';document.getElementById('stars').innerHTML=s})();
var now=new Date().getFullYear(),LB=['年','月','日','时'],LOCALE=localStorage.getItem('bazi_locale')||'cn',_lastResult=null;

var CS=[['长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝','胎','养'],['死','病','衰','帝旺','临官','冠带','沐浴','长生','养','胎','绝','墓'],['胎','养','长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝'],['绝','墓','死','病','衰','帝旺','临官','冠带','沐浴','长生','养','胎'],['胎','养','长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝'],['绝','墓','死','病','衰','帝旺','临官','冠带','沐浴','长生','养','胎'],['死','墓','绝','胎','养','长生','沐浴','冠带','临官','帝旺','衰','病'],['长生','养','胎','绝','墓','死','病','衰','帝旺','临官','冠带','沐浴'],['帝旺','衰','病','死','墓','绝','胎','养','长生','沐浴','冠带','临官'],['冠带','临官','帝旺','衰','病','死','墓','绝','胎','养','长生','沐浴']];
var kw='戌亥申酉午未辰巳寅卯子丑',WS_COLOR={木:'#6abf6a',火:'#e07060',土:'#f0d080',金:'#c0c8d0',水:'#5a8fc0'};

function setMode(m){_inputMode=m;var el=document.getElementById('mode_sw');if(!el)return;var divs=el.querySelectorAll('div');divs.forEach(function(e,i){e.className=(i===0&&m==='solar')||(i===1&&m==='lunar')?'on':''})}
function setCity(){var s=document.getElementById('city');if(!s)return;var o=s.options[s.selectedIndex];if(o){var lon=o.getAttribute('data-lon');var lat=o.getAttribute('data-lat');if(lon&&lat){document.getElementById('lon').value=lon;document.getElementById('lat').value=lat}}}

function initForm(){
  if($('y'))return;
  var mem=(function(){try{return JSON.parse(localStorage.getItem('bazi_inp'))||{}}catch(e){return{}}}());
  var y=mem.y||1990,m=mem.m||8,d=mem.d||27,h=mem.h||15,mi=mem.mi||30,g=mem.g||'male',fn=mem.fn||'',lon=mem.lon||'120',lat=mem.lat||'30',tsv=mem.ts||false,ci=mem.city||'';
  $('app').innerHTML=
    '<div style=display:flex;gap:5px;justify-content:flex-end;margin-bottom:4px>'
    +'<button onclick=showLunar() class=btn-s style=background:rgba(255,255,255,.04);color:#c4a265>'+'🌙 公历转农历'+(LOCALE==='cn'?'公历转农历':'Solar\u2192Lunar')+'</button>'
    +'<button onclick=toggleLang() class=btn-s style=background:rgba(255,255,255,.04);color:#c4a265>'+(LOCALE==='cn'?'EN':'中文')+'</button>'
    +'<button onclick=showHist() class=btn-s style=background:rgba(255,255,255,.04);color:#c4a265>'+(LOCALE==='cn'?'📋 历史':'📋 History')+'</button>'
    +'</div>'

    +'<div class=sw id=mode_sw><div class=on onclick=setMode("solar")>'+(LOCALE==='cn'?'阳历':'Solar')+'</div><div onclick=setMode("lunar")>'+(LOCALE==='cn'?'农历':'Lunar')+'</div></div>'
    +'<div class=fr><div class=fg style=flex:1.2><label>'+(LOCALE==='cn'?'姓名 (选填)':'Name')+'</label><input id=fn value="'+fn.replace(/"/g,'')+'"></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'年':'Year')+'</label><input type=number id=y value='+y+'></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'月':'Month')+'</label><input type=number id=m value='+m+'></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'日':'Day')+'</label><input type=number id=d value='+d+'></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'时':'Hour')+'</label><input type=number id=h value='+h+'></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'分':'Min')+'</label><input type=number id=mi value='+mi+'></div>'
    +'</div>'
    +'<div class=gr><label style=display:flex;align-items:center;gap:4px><input type=checkbox id=ts onchange=toggleTs() '+(tsv?'checked':'')+'>'+(LOCALE==='cn'?'真太阳时':'TrueSolar')+'</label>'
    +'<span style=font-size:9px;color:#5a4a3a>'+(LOCALE==='cn'?'(经度/纬度)':'(Long/Lat)')+'</span></div>'
    +'<div id=ts_fields style=display:'+(tsv?'flex':'none')+';gap:4px>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'城市':'City')+'</label><select id=city style=width:100%;padding:4px;border:1px solid rgba(180,140,100,.12);border-radius:4px;font-size:10px;background:rgba(255,255,255,.05);color:#e0d8d0;outline:none onchange=setCity()>'
    +'<option value="">'+(LOCALE==='cn'?'选择城市':'Select')+'</option>'
    +PROVINCES.map(function(p){return'<option value="'+p[0]+'" data-lon="'+p[1]+'" data-lat="'+p[2]+'"'+(ci===p[0]?' selected':'')+'>'+p[0]+'</option>'}).join('')
    +'</select></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'经度':'Long')+'</label><input type=number step=0.1 id=lon value='+lon+' style=font-size:10px></div>'
    +'<div class=fg><label>'+(LOCALE==='cn'?'纬度':'Lat')+'</label><input type=number step=0.1 id=lat value='+lat+' style=font-size:10px></div></div>'
    +'<div class=gr><label><input type=radio name=g value=male'+(g==='male'?' checked':'')+'>'+(LOCALE==='cn'?'男':'Male')+'</label>'
    +'<label><input type=radio name=g value=female'+(g==='female'?' checked':'')+'>'+(LOCALE==='cn'?'女':'Female')+'</label>'

$('app').insertAdjacentHTML('beforeend','<div id=results></div>');

function render(){
  if(!$('y'))initForm();
  if(!$('y')){setTimeout(render,100);return}
  var ts=$('ts')&&$('ts').checked;
  var lon=$('lon')?+$('lon').value:null;
  var lat=$('lat')?+$('lat').value:null;
  var sv=$('city')?$('city').value:'';
  var ym=+$('y').value,mm=+$('m').value,dm=+$('d').value,hm=+$('h').value,mim=+$('mi').value,gm=document.querySelector('input[name=g]:checked').value;
  localStorage.setItem('bazi_inp',JSON.stringify({y:ym,m:mm,d:dm,h:hm,mi:mim,g:gm,fn:document.getElementById('fn').value,lon:lon,lat:lat,ts:ts,city:sv}));
  var cy=ym,cm=mm,cd=dm;
  if(_inputMode==='lunar'){try{var cr=BaZi.lunarToSolar(ym,mm,dm,false);if(cr){cy=cr.year;cm=cr.month;cd=cr.day}}catch(e){}}
  var opts={year:cy,month:cm,day:cd,hour:hm,minute:mim,gender:gm};
  if(ts&&lon)opts.longitude=lon;
  if(ts&&lat)opts.latitude=lat;
  if(ts)opts.useTrueSolar=true;
  var r=BaZi.calculateBaZi(opts);
  _lastResult=r;
  var p=r.pillars,ps=[p.year,p.month,p.day,p.hour],ld=r.lunarDate||{},WXS=r.wuXingAnalysis,DA=r.deityAnalysis,FI=r.fortuneInteraction,age=now-r.input.year;
  var wse=['木','火','土','金','水'];
  var infoNote='';
  if(_inputMode==='lunar')infoNote+=' '+(LOCALE==='cn'?'(农历排算)':'(Lunar)');
  if(ts)infoNote+=' '+(LOCALE==='cn'?'真太阳时':'TST')+(lon?' ('+lon+'\u00B0,'+lat+'\u00B0)':'');
  var h='<div style=display:flex;gap:5px;justify-content:flex-end;margin-bottom:6px>'
    +'<button onclick=openAI() class=btn-s style=background:rgba(255,255,255,.04);color:#c4a265>'+(LOCALE==='cn'?'🤖 AI分析':'🤖 AI')+'</button>'
    +'<button onclick=window.print() class=btn-s style=background:rgba(255,255,255,.04);color:#c4a265>'+(LOCALE==='cn'?'📄 导出PDF':'📄 PDF')+'</button>'
    +'</div>';
  h+='<div style=display:flex;gap:12px;align-items:center;background:linear-gradient(145deg,rgba(28,24,20,.96),rgba(18,16,14,.96));border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid rgba(180,140,100,.15)>'
    +'<div style=width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#c4a265,#8b6914);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0>'+r.zodiac+'</div>'
    +'<div style=flex:1><div style=font-size:13px;font-weight:600;color:#c4a265>'+(document.getElementById('fn').value||'')+'</div>'
    +'<div style=font-size:12px;color:#e0d8d0>'+(ld.lunarYearGz||'')+(ld.month?'年 '+ld.month+'月'+ld.day+'日':'')+'</div>'
    +'<div style=font-size:10px;color:#887a6e>'+r.input.year+'/'+r.input.month+'/'+r.input.day+' '+r.input.hour+':'+r.input.minute+infoNote+'</div></div>'
    +'<div style=font-size:20px;font-weight:700;letter-spacing:2px;color:#e0d8d0;text-align:right>'+r.eightChars+'</div></div>';
  h+='<div class=tw><table class=pt>';
  h+='<tr><th></th><th>'+(LOCALE==='cn'?'年柱':'Year')+'</th><th>'+(LOCALE==='cn'?'月柱':'Month')+'</th><th>'+(LOCALE==='cn'?'日柱':'Day')+'</th><th>'+(LOCALE==='cn'?'时柱':'Hour')+'</th></tr>';
  h+='<tr class=hl><td>'+(LOCALE==='cn'?'主星':'Mast')+'</td><td style=font-size:15px;font-weight:700;color:#c4a265>'+r.tenGods.yearGan+'</td><td style=font-size:15px;font-weight:700;color:#c4a265>'+r.tenGods.monthGan+'</td><td style=font-size:15px;font-weight:700;color:#c4a265>'+(r.input.gender==='male'?(LOCALE==='cn'?'元男':'YuanM'):(LOCALE==='cn'?'元女':'YuanF'))+'</td><td style=font-size:15px;font-weight:700;color:#c4a265>'+r.tenGods.hourGan+'</td></tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'天干':'Heav')+'</td>';for(var i=0;i<4;i++)h+='<td><span class="'+gc(ps[i].gan)+'" style=font-size:16px;font-weight:600>'+ps[i].ganName+'</span><span class=sm>'+BaZi.GAN_WU_XING[ps[i].gan]+'</span></td>';h+='</tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'地支':'Earth')+'</td>';for(var i=0;i<4;i++)h+='<td><span class="'+zc(ps[i].zhi)+'" style=font-size:16px;font-weight:600>'+ps[i].zhiName+'</span><span class=sm>'+BaZi.ZHI_WU_XING[ps[i].zhi]+'</span></td>';h+='</tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'藏干<br><span style=font-size:8px;color:#6a5e50>副星</span>':'Hid<br><span style=font-size:8px;color:#6a5e50>TG</span>')+'</td>';
  for(var i=0;i<4;i++)h+='<td>'+(r.hiddenStems[i].map(function(hx){return'<span style=display:block;font-size:10px;line-height:1.5><span class="'+gc(hx.gan)+'" style=font-weight:600>'+hx.ganName+'</span>'+hx.element+'<span style=color:#c4a265;margin-left:2px>'+hx.tenGod+'</span></span>'}).join('')||'-')+'</td>';h+='</tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'星运':'Stag')+'</td>';for(var dm=r.pillars.day.gan,i=0;i<4;i++)h+='<td style=color:#887a6e>'+(CS[dm]?.[ps[i].zhi]||'')+'</td>';h+='</tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'自坐':'Self')+'</td>';for(var i=0;i<4;i++)h+='<td style=color:#887a6e>'+(CS[ps[i].gan]?.[ps[i].zhi]||'')+'</td>';h+='</tr>';
  var kv=ps.map(function(p){for(var sx=0;sx<60;sx++){if(sx%10===p.gan&&sx%12===p.zhi)return kw.substr(Math.floor(sx/10)*2,2)}return''});
  h+='<tr><td>'+(LOCALE==='cn'?'空亡':'Void')+'</td>';for(var i=0;i<4;i++)h+='<td>'+(kv[i]?'<span style=color:#6a5e50>'+kv[i]+'</span>':'-')+'</td>';h+='</tr>';
  h+='<tr><td>'+'纳音'+'</td>';for(var i=0;i<4;i++)h+='<td style=color:#9a8a7a>'+r.naYin[i]+'</td>';h+='</tr>';
  h+='<tr><td>'+(LOCALE==='cn'?'神煞':'S.Sha')+'</td>';for(var i=0;i<4;i++){var ss=r.shenShaDetail[i];h+='<td style=font-size:9px;color:#9a8a7a>'+(ss.map(function(s){return'<span class=tag>'+s.name+'</span>'}).join('')||'')+'</td>';}h+='</tr>';

  if(sxDesc)h+='<div class=fc><div class=ft>'+(LOCALE==='cn'?'神煞明细':'ShenSha')+'</div><div style=font-size:11px;color:#9a8a7a;line-height:1.7>'+sxDesc+'</div></div>';
